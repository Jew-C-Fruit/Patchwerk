<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patchwerk — Flex ✦ Artifix build</title>
<style>
  :root {
    --plane: #0d0d0d; --surface: #1a1a19; --card: #202020; --ink-1: #f2f1ea;
    --ink-2: #a9a89e; --hairline: #2c2c2a; --border: rgba(255,255,255,0.10);
    --audio: #3987e5; --ctl: #1baf7a; --mod: #9085e9; --tonic: #d9a521;
    --danger: #e34948; --meter: #1baf7a; --grid: rgba(255,255,255,0.045);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body { background: var(--plane); color: var(--ink-1);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 13px;
    /* a patch canvas is all drags — never let a gesture select text */
    -webkit-user-select: none; user-select: none; }
  input, textarea { -webkit-user-select: auto; user-select: auto; }

  header { position: fixed; inset: 0 0 auto 0; z-index: 40; display: flex; gap: 10px;
    align-items: center; flex-wrap: wrap; padding: 7px 14px;
    background: color-mix(in srgb, var(--plane) 85%, transparent);
    backdrop-filter: blur(6px); border-bottom: 1px solid var(--hairline); }
  header h1 { font-size: 14px; margin: 0; font-weight: 650; white-space: nowrap; }
  header .grp { display: flex; gap: 5px; align-items: center; white-space: nowrap; }
  header .lb { font-size: 9px; letter-spacing: 0.07em; color: var(--ink-2);
    text-transform: uppercase; }
  header button, header select, header input[type=text] { background: var(--card);
    color: var(--ink-1); font-size: 11px; border: 1px solid var(--border);
    border-radius: 7px; padding: 2px 8px; cursor: pointer; font-family: inherit; }
  header input[type=text] { cursor: text; width: 74px; }
  header select { max-width: 120px; }
  header button:hover { border-color: var(--ink-2); }
  header input[type=range] { width: 84px; accent-color: var(--audio); height: 14px; }
  header a { color: var(--ink-2); font-size: 11px; text-decoration: none; }
  header a:hover { color: var(--ink-1); }
  header label { font-size: 11px; color: var(--ink-2); display: flex; gap: 3px;
    align-items: center; }
  #status { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--danger); margin-right: 5px; vertical-align: 1px; }
  #status.ok { background: var(--meter); }
  .mbars { display: flex; flex-direction: column; gap: 2px; width: 70px; }
  .mbars > div { height: 5px; background: var(--hairline); border-radius: 3px; overflow: hidden; }
  .mbars > div > div { height: 100%; width: 0%; background: var(--meter);
    transition: width 50ms linear; }
  .mbars > div.clip > div { background: var(--danger); }
  #beat-pos { font-variant-numeric: tabular-nums; min-width: 28px; display: inline-block;
    color: var(--ink-1); }
  #midi-ind { font-size: 10px; color: var(--ink-2); max-width: 130px; overflow: hidden;
    text-overflow: ellipsis; }

  #palette { position: fixed; top: 54px; left: 0; bottom: 0; width: 172px; z-index: 30;
    background: color-mix(in srgb, var(--surface) 92%, transparent); border-right: 1px solid var(--hairline);
    overflow-y: auto; padding: 10px; backdrop-filter: blur(6px); }
  #palette h3 { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-2); margin: 12px 2px 5px; font-weight: 600; }
  #palette button { display: flex; align-items: center; gap: 7px; width: 100%; text-align: left;
    background: var(--card); color: var(--ink-1); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 8px; margin: 3px 0; font-size: 12px; cursor: pointer; }
  #palette button:hover { border-color: var(--ink-2); }
  #palette button i { width: 8px; height: 8px; border-radius: 2px; flex: none; }

  #board { position: absolute; inset: 54px 0 0 0; overflow: auto; }
  #world { position: relative; width: 2600px; height: 1800px;
    background-image: linear-gradient(var(--grid) 1px, transparent 1px),
                      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 24px 24px; }
  svg#wires { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  svg#wires path.hit { pointer-events: stroke; cursor: default; }
  /* v8: wire labels are DRAG HANDLES — grab a badge, drop it on a module */
  #wire-labels g { pointer-events: auto; cursor: grab; }
  .mod.splice-target { border-color: rgba(255,255,255,0.85);
    box-shadow: 0 0 0 1.5px rgba(255,255,255,0.55), 0 3px 14px rgba(0,0,0,0.45); }
  svg#wires path.hit.cuttable { cursor: pointer; }
  svg#wires path.splice-hi { stroke-width: 5 !important;
    filter: brightness(1.4) drop-shadow(0 0 4px rgba(255,255,255,0.45)); }
  svg#wires path.flow { stroke: #fff; stroke-width: 2.7; fill: none;
    stroke-linecap: round; stroke-dasharray: 0.1 16;
    animation: flowdots 0.55s linear infinite; opacity: 0.95; }
  @keyframes flowdots { to { stroke-dashoffset: -16.1; } }
  svg#wiretop { position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 15; }

  .mod { position: absolute; width: 170px; background: var(--card);
    border: 1px solid var(--border); border-radius: 9px; user-select: none;
    box-shadow: 0 3px 14px rgba(0,0,0,0.45); z-index: 1; }
  .mod.dragging { opacity: 0.9; box-shadow: 0 10px 26px rgba(0,0,0,0.6); z-index: 20; }
  .mod.shifting { transition: left 140ms ease, top 140ms ease; }
  .mod.bypassed .body, .mod.bypassed .viz-sec { opacity: 0.4; }
  .mod.rec { outline: 1.5px solid var(--danger); box-shadow: 0 0 10px rgba(227,73,72,0.5); }
  .mod .head { display: flex; align-items: center; gap: 7px; padding: 7px 9px 4px; cursor: grab; }
  .mod .head:active { cursor: grabbing; }
  .mod .stripe { width: 4px; align-self: stretch; border-radius: 3px; flex: none; }
  .mod .title { font-weight: 640; font-size: 12.5px; line-height: 1.15; }
  .mod .sub { font-size: 9.5px; color: var(--ink-2); }
  .mod .kill { margin-left: 2px; color: var(--ink-2); font-size: 11px; cursor: pointer;
    padding: 0 2px; border-radius: 4px; }
  .mod .kill:hover { color: var(--danger); }
  .mod .onoff { margin-left: auto; width: 12px; height: 12px; accent-color: var(--ctl);
    cursor: pointer; flex: none; }
  .mod .body { padding: 1px 10px 8px 14px; }
  .mod.alloc-card .body { padding-right: 22px; }  /* clear lane for the 6 dim ports */
  .mini { display: flex; align-items: center; gap: 6px; margin: 2.5px 0; height: 11px; }
  .mini label { font-size: 9px; color: var(--ink-2); width: 48px; flex: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini .track { flex: 1; height: 11px; position: relative; cursor: ew-resize; }
  .mini .track::before { content: ""; position: absolute; top: 4px; left: 0; right: 0;
    height: 3px; border-radius: 2px; background: var(--hairline); }
  .mini .track i { position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 7px; height: 7px; border-radius: 50%; background: var(--ink-2); }
  .mini .track i.zero { background: var(--danger); }
  .mini.mapped .track i { background: var(--mod); }
  .mini .v { width: 34px; flex: none; font-size: 8.5px; color: var(--ink-2);
    text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap;
    overflow: hidden; }
  .mini .chip { flex: 1; font-size: 9px; color: var(--ink-1); background: var(--hairline);
    border-radius: 3px; padding: 0 5px; line-height: 11px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini .chip:hover { background: #3a3a38; }
  .mini .chip.static { cursor: default; }
  .viz-sec { padding: 3px 10px 8px 14px; }
  canvas.vz { width: 100%; display: block; background: var(--plane);
    border: 1px solid var(--hairline); border-radius: 6px; }
  .deckbtns { display: flex; gap: 4px; margin: 3px 0; }
  .deckbtns button { flex: 1; background: var(--hairline); color: var(--ink-1); border: 0;
    border-radius: 4px; font-size: 9px; padding: 2px 0; cursor: pointer; font-family: inherit; }
  .deckbtns button:hover { background: #3a3a38; }
  .deckbtns button.recbtn { color: var(--danger); font-weight: 700; }
  .dgrid { display: grid; grid-template-columns: repeat(16, 1fr); gap: 2px; margin: 2px 0; }
  .dlane { font-size: 8px; color: var(--ink-2); height: 9px; margin-top: 3px; }
  .dstep { aspect-ratio: 1; border: 0; padding: 0; border-radius: 2px;
    background: var(--hairline); cursor: pointer; }
  .dstep.on { background: var(--audio); }
  .dstep.q { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14); }
  .dstep.ph { outline: 1.5px solid rgba(255,255,255,0.75); }
  .expander { cursor: pointer; color: var(--ink-2); font-size: 10px; padding: 0 3px;
    margin-left: 2px; }
  .expander:hover { color: var(--ink-1); }
  /* key shifter: progression step strip + the pop-out key palette */
  .ksgrid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px; margin: 2px 0; }
  .ksstep { aspect-ratio: 1; border: 0; padding: 0; border-radius: 2px;
    background: var(--hairline); cursor: pointer; color: var(--ink-2);
    font-size: 8px; font-family: inherit; line-height: 1; }
  .ksstep.on { background: var(--ctl); color: #0d0d0d; font-weight: 700; }
  .ksstep.sel { outline: 1.5px solid #fff; }
  .ksstep.ph { box-shadow: 0 0 0 1.5px rgba(255,255,255,0.75); }
  #keypop { position: fixed; z-index: 80; background: var(--card);
    border: 1px solid var(--ink-2); border-radius: 9px; padding: 6px;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.6); }
  #keypop button { background: var(--hairline); color: var(--ink-1); border: 0;
    border-radius: 5px; font-size: 10px; padding: 5px 7px; cursor: pointer;
    font-family: inherit; white-space: nowrap; }
  #keypop button:hover { background: #3a3a38; }
  #keypop button.sel { background: var(--ctl); color: #0d0d0d; font-weight: 700; }

  .port { position: absolute; width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid var(--plane); cursor: crosshair; z-index: 5; }
  .port.subtle { width: 9px; height: 9px; border-width: 1.5px; opacity: 0.78; }
  .port::after { content: attr(data-label); position: absolute;
    font-size: 8.5px; color: var(--ink-2); white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity 120ms; }
  .port.e-top::after { top: 14px; left: 50%; transform: translateX(-50%); }
  .port.e-bottom::after { bottom: 14px; left: 50%; transform: translateX(-50%); }
  .port.e-left::after { left: 13px; top: 50%; transform: translateY(-50%); }
  .port.e-right::after { right: 13px; top: 50%; transform: translateY(-50%); }
  .port:hover::after, .port.hot::after { opacity: 1; }
  .port[data-sig=audio] { background: var(--audio); }
  .port[data-sig=ctl]   { background: var(--ctl); }
  .port[data-sig=mod]   { background: var(--mod); }
  /* tonic handles sit above the quiet per-param mod handles on the same edge */
  .port[data-sig=tonic] { background: var(--tonic); z-index: 6; }
  .port.quiet { width: 7px; height: 7px; border-width: 1.5px;
    background: #6f6d64; opacity: 0.5; }
  .port.quiet:hover, .port.quiet.hot { opacity: 1; background: var(--mod); }
  .port.hot { box-shadow: 0 0 0 4px color-mix(in srgb, currentColor 30%, transparent); }
  .legend { display: flex; gap: 12px; font-size: 10px; color: var(--ink-2); }
  .legend b { display: inline-block; width: 18px; height: 3px; border-radius: 2px;
    vertical-align: middle; margin-right: 4px; }
  .hint { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    z-index: 40; font-size: 11px; color: var(--ink-2);
    background: color-mix(in srgb, var(--plane) 85%, transparent);
    border: 1px solid var(--hairline); border-radius: 8px; padding: 4px 12px;
    backdrop-filter: blur(6px); white-space: nowrap; }
  #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 60; font-size: 11px; color: var(--ink-1); background: #2c2c2a;
    border: 1px solid var(--border); border-radius: 8px; padding: 5px 14px;
    opacity: 0; transition: opacity 200ms; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; }
  #ghost-card { position: fixed; z-index: 70; width: 170px; pointer-events: none;
    background: var(--card); border: 1px solid var(--ink-2); border-radius: 9px;
    opacity: 0.85; box-shadow: 0 10px 26px rgba(0,0,0,0.6); padding: 8px 10px;
    display: flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 640; }
  #ghost-card i { width: 4px; height: 22px; border-radius: 3px; flex: none; }
</style>
</head>
<body>
<header id="hdr">
  <h1><span id="status"></span>Patchwerk · flex <span style="color:var(--mod);font-size:10px;font-weight:400">✦ Artifix</span></h1>
  <button id="reconnect-btn" title="force reconnect">⟳</button>
  <div class="grp"><span class="lb">patch</span><select id="patch-sel"></select></div>
  <div class="grp"><span class="lb">preset</span><select id="preset-sel"></select>
    <button id="preset-load">load</button>
    <input type="text" id="preset-name" placeholder="save as">
    <button id="preset-save">save</button>
    <button id="preset-del" title="delete selected">✕</button></div>
  <div class="grp"><button id="play-btn" title="transport play/stop">▶</button>
    <span class="lb" id="bpm-v">— bpm</span>
    <input type="range" id="bpm" min="40" max="220" step="1">
    <select id="meter" title="meter"><option value="2">2/4</option><option value="3">3/4</option>
      <option value="4" selected>4/4</option><option value="6">6/8</option></select>
    <label><input type="checkbox" id="click-on">click</label>
    <span class="lb">pos</span><b id="beat-pos">—</b>
    <span class="lb">tonic</span><b id="tonic-root" style="font-size:11px">—</b></div>
  <div class="grp"><span class="lb">master</span>
    <input type="range" id="vol" min="0" max="1" step="0.001" value="0.8">
    <div class="mbars"><div id="m-out-l"><div></div></div><div id="m-out-r"><div></div></div></div></div>
  <div class="grp"><label><input type="checkbox" id="keys-on" checked>keys</label>
    <b id="oct" style="font-size:11px">C4</b>
    <b id="caps-note" style="color:var(--danger);font-size:10px"></b></div>
  <span id="midi-ind">midi: —</span>
  <button id="tidy" title="compact the layout">⇱ tidy</button>
  <div class="legend">
    <span><b style="background:linear-gradient(90deg,#3987e5,#22b8d4)"></b>audio</span>
    <span><b style="background:linear-gradient(90deg,#1baf7a,#e8c832)"></b>notes</span>
    <span><b style="background:linear-gradient(90deg,#e34948,#9085e9)"></b>mod</span>
    <span data-legend="tonic"><b style="background:linear-gradient(90deg,#d9a521,#f0c96a)"></b>tonic</span>
  </div>
  <a href="/legacy">legacy gui →</a>
</header>
<div id="palette"></div>
<div id="board"><div id="world">
  <svg id="wires">
    <g id="wire-perm"></g>
    <g id="wire-labels" style="font: 600 8.5px system-ui; text-anchor: middle;"></g>
    <path id="wire-live" fill="none" stroke-width="2.5" stroke-dasharray="5 5" style="display:none"/>
  </svg>
  <svg id="wiretop"></svg>
</div></div>
<div class="hint">keys <b>A–;</b> play · <b>Z/X</b> octave · <b>caps</b> sustain · <b>space</b> loop-rec
  · click any wire to cut · drag port→port to wire · drag from the palette to splice</div>
<div id="toast"></div>

<script>
"use strict";
// ============================================================================
// flex.html — the subway-routed patch canvas from the visual prototype, wired
// to the REAL synth over the websocket protocol (see synthbase/server.py).
// Graph nodes/wires are DERIVED from every `state` message; card positions
// survive rebuilds (and reloads, via localStorage keyed by patch name).
// ============================================================================
const GRID = 24, CARD_W = 170, CELL = 12;
const WORLD_W = 2600, WORLD_H = 1800;
const COLS = WORLD_W / CELL | 0, ROWS = WORLD_H / CELL | 0;

const FAMILY = {
  voice: "#3987e5", input: "#1baf7a", filter: "#eda100", time: "#199e70",
  dirt: "#eb6834", dyn: "#e87ba4", vox: "#e34948", service: "#9085e9",
  io: "#c3c2b7", ctl: "#1baf7a", source: "#3987e5", effect: "#199e70",
  mod: "#9085e9",
};
// subway line palettes — audio owns the cools, notes/control green→yellow,
// mod the warm+violet half (the population that grows), tonic amber/gold.
const LINES = {
  audio: ["#3987e5", "#22b8d4", "#1f9e9e", "#6db1ff", "#4a5fd0", "#7fd4ef"],
  ctl:   ["#1baf7a", "#8cc63f", "#e8c832", "#4fd08c", "#c9d94d", "#0f8f66"],
  mod:   ["#e34948", "#f2842c", "#d446b8", "#9085e9", "#e87ba4", "#ff6b5e", "#7a5fd0"],
  tonic: ["#d9a521", "#f0c96a", "#b8860b", "#e8b93e"],
};
const lineCount = {audio: 0, ctl: 0, mod: 0, tonic: 0};
const BASE_R = 9, LANE = 6;
const LANE_SEQ = [0, -1, 1, -2, 2, -3, 3];
const SIG_CSS = {audio: "var(--audio)", ctl: "var(--ctl)", mod: "var(--mod)",
                 tonic: "var(--tonic)"};

const world = document.getElementById("world");
const wiresPerm = document.getElementById("wire-perm");
const wireLive = document.getElementById("wire-live");
const $ = (id) => document.getElementById(id);

const nodes = new Map();      // gid -> node
const wires = [];
let state = null;

// ---------- websocket (legacy's watchdog verbatim) ----------
let ws = null, lastMsg = 0, reconnectTimer = null;
function scheduleReconnect(ms) {
  clearTimeout(reconnectTimer);
  reconnectTimer = setTimeout(connect, ms);
}
function connect() {
  if (ws && ws.readyState <= 1) return;
  try {
    ws = new WebSocket(`ws://${location.host}/ws`);
  } catch (_) {   // file:// or bad host — keep the page alive, retry later
    scheduleReconnect(3000);
    return;
  }
  ws.onopen = () => {
    lastMsg = performance.now();
    $("status").classList.add("ok");
    // flush anything queued while the socket was down — a dropped note_off
    // or all_notes_off leaves stuck notes + never-clearing monitor bars
    const q = outbox.splice(0, outbox.length);
    for (const m of q) {
      try { ws.send(JSON.stringify(m)); } catch (_) { break; }
    }
    // a fresh socket means the server already silenced us (last-client
    // disconnect = all_notes_off) — any tap still open predates this
    // connection and would otherwise pin a full-width bar forever
    for (const ev of tapNotes) if (ev.t1 === null) ev.t1 = performance.now();
  };
  ws.onclose = () => { $("status").classList.remove("ok"); scheduleReconnect(800); };
  ws.onerror = () => { try { ws.close(); } catch (_) {} };
  ws.onmessage = (ev) => {
    lastMsg = performance.now();
    const m = JSON.parse(ev.data);
    if (m.type === "state") { state = m; onState(); }
    else if (m.type === "meters") onMeters(m);
    else if (m.type === "param") onParam(m);
    else if (m.type === "midi") onMidi(m.event);
    else if (m.type === "beat") onBeat(m);
    else if (m.type === "tonic") $("tonic-root").textContent = m.root || "—";
    else if (m.type === "scope_data") onScopeData(m);
    else if (m.type === "trajectory") onTrajectory(m);
    else if (m.type === "error") console.warn("server:", m.message);
  };
}
// messages sent during a reconnect gap are QUEUED, not dropped (v7: dropped
// note_offs were leaving stuck notes and permanent green monitor bars)
const outbox = [];
function send(m) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(m));
  else {
    outbox.push(m);
    if (outbox.length > 200) outbox.shift();  // bounded: knob spam can go
  }
}
function ensureLive() {
  if (!ws || ws.readyState >= 2) { connect(); return; }
  if (ws.readyState === 1 && performance.now() - lastMsg > 3000) {
    $("status").classList.remove("ok");
    try { ws.close(); } catch (_) {}
    scheduleReconnect(150);
  }
}
setInterval(() => { if (!document.hidden) ensureLive(); }, 2000);
window.addEventListener("focus", ensureLive);
document.addEventListener("visibilitychange", () => { if (!document.hidden) ensureLive(); });
document.addEventListener("pointerdown", ensureLive, true);
window.addEventListener("keydown", ensureLive, true);
$("reconnect-btn").addEventListener("click", (e) => {
  try { ws && ws.close(); } catch (_) {}
  scheduleReconnect(100);
  e.target.blur();
});

// ---------- unit <-> value curve math (legacy verbatim) ----------
function fmt(v) {
  if (v >= 1000) return v.toFixed(0);
  if (v >= 100) return v.toFixed(1);
  if (v >= 10) return v.toFixed(2);
  return v.toFixed(3);
}
function toUnit(p, value) {
  if (p.curve === "exp") {
    const lo = Math.max(p.min, 1e-6);
    return Math.log(value / lo) / Math.log(p.max / lo);
  }
  return (value - p.min) / (p.max - p.min || 1);
}
function fromUnit(p, u) {
  if (p.curve === "exp") {
    const lo = Math.max(p.min, 1e-6);
    return lo * Math.pow(p.max / lo, u);
  }
  return p.min + u * (p.max - p.min);
}
const timers = {};
function throttled(key, fn, ms = 30) {
  if (timers[key]) { timers[key].fn = fn; return; }
  fn();
  timers[key] = { fn: null };
  setTimeout(() => {
    const pending = timers[key].fn;
    delete timers[key];
    if (pending) throttled(key, pending, ms);
  }, ms);
}

// ---------- layout persistence ----------
// positions per patch: {pos: {gid: [x,y]}, monitors: [[gid, type, x, y, expanded]], monN}
let currentPatch = null, posMem = {}, monN = 1;
function storeKey(patch) { return "supersynth.flex." + patch; }
function saveLayout() {
  if (!currentPatch) return;
  throttled("savelayout", () => {

// ---- key shifter: Grasshopper-ish key popover + progression step strip ----
// 12 pitch classes labeled from A (values = semitone distance from C, the
// home key — the backend maps that distance to the NEAREST shift, ±6 st).
const KEY_LABELS = [["A", 9], ["A#/Bb", 10], ["B", 11], ["C", 0], ["C#/Db", 1],
                    ["D", 2], ["D#/Eb", 3], ["E", 4], ["F", 5], ["F#/Gb", 6],
                    ["G", 7], ["G#/Ab", 8]];
const KEY_SHORT = ["C", "C#", "D", "Eb", "E", "F", "F#", "G", "Ab", "A", "Bb", "B"];
let keyPop = null;
function closeKeyPop() { if (keyPop) { keyPop.remove(); keyPop = null; } }
function openKeyPop(anchorEl, current, onPick) {
  closeKeyPop();
  const el = document.createElement("div");
  el.id = "keypop";
  for (const [label, pc] of KEY_LABELS) {
    const b = document.createElement("button");
    b.textContent = label;
    if (pc === current) b.classList.add("sel");
    b.addEventListener("pointerdown", (e) => e.stopPropagation());
    b.addEventListener("click", (e) => { e.stopPropagation(); onPick(pc); });
    el.appendChild(b);
  }
  document.body.appendChild(el);
  const r = anchorEl.getBoundingClientRect();
  el.style.left = Math.max(8, Math.min(window.innerWidth - el.offsetWidth - 8,
                                       r.right + 8)) + "px";
  el.style.top = Math.max(8, Math.min(window.innerHeight - el.offsetHeight - 8,
                                      r.top - 8)) + "px";
  keyPop = el;
}
// click-away closes (capture phase: runs before whatever was clicked)
document.addEventListener("pointerdown", (e) => {
  if (keyPop && !keyPop.contains(e.target)) closeKeyPop();
}, true);

const KS_LENGTHS = [1, 2, 4, 8, 12, 16, 24, 32];
function buildKeyshiftCard(k) {
  const gid = k.id;
  const suffix = gid.includes(".") ? " " + gid.split(".")[1] : "";
  const sendKS = () => send({type: "set_keyshift", id: gid, key: k.key,
                             length: k.length, steps: k.steps});
  let selStep = null;
  const rows = [
    rowChip({gid}, "key", {
      text: KEY_SHORT[k.active ?? k.key] ?? "C",
      onClick: (chip) => {
        openKeyPop(chip, k.key, (pc) => {
          k.key = pc;
          if (!k.steps.some(s => s !== null)) k.active = pc;  // static mode
          chip.textContent = KEY_SHORT[k.active ?? pc];
          sendKS();
          closeKeyPop();
        });
      },
    }),
    rowChip({gid}, "length", {
      text: k.length + (k.length === 1 ? " bar" : " bars"),
      onClick: (chip) => {
        const i = KS_LENGTHS.indexOf(k.length);
        k.length = KS_LENGTHS[(i + 1) % KS_LENGTHS.length];
        while (k.steps.length < k.length) k.steps.push(null);
        k.steps.length = k.length;
        chip.textContent = k.length + (k.length === 1 ? " bar" : " bars");
        sendKS();
        paintSteps(n, true);
      },
    }),
  ];
  const n = addCard({gid, name: "Key Shifter" + suffix, short: "Shift" + suffix,
    sub: "key transpose · 4 lanes", fam: "ctl", rows,
    expandable: true, expanded: !!expandMem[gid], wide: true,
    vizHTML: `<div class="ksgrid"></div>`,
    kill: () => send({type: "remove_keyshift", id: gid}),
    ports: [["in", "ctl", "in.1"], ["in", "ctl", "in.2"],
            ["in", "ctl", "in.3"], ["in", "ctl", "in.4"],
            ["out", "ctl", "out.1"], ["out", "ctl", "out.2"],
            ["out", "ctl", "out.3"], ["out", "ctl", "out.4"]]});
  for (const p of n.ports) {           // lane handles: "in.3" → lane 3
    const m2 = /^(?:in|out)\.(\d)$/.exec(p.label);
    if (m2) p.lane = parseInt(m2[1], 10);
  }
  n.ks = k;
  const paintSteps = (node, rebuild) => {
    const grid = node.el.querySelector(".ksgrid");
    if (!grid) return;
    if (rebuild || grid.children.length !== k.length) {
      grid.innerHTML = "";
      grid.style.gridTemplateColumns =
        `repeat(${Math.min(8, Math.max(4, k.length))}, 1fr)`;
      for (let s = 0; s < k.length; s++) {
        const b = document.createElement("button");
        b.className = "ksstep";
        b.dataset.s = s;
        b.addEventListener("pointerdown", (e) => e.stopPropagation());
        b.addEventListener("click", (e) => {
          e.stopPropagation();
          const i = parseInt(b.dataset.s, 10);
          if (selStep === i) {
            // click the (selected) assigned step again = clear it
            if (k.steps[i] !== null) { k.steps[i] = null; sendKS(); }
            selStep = null;
            closeKeyPop();
          } else {
            selStep = i;   // select, then pick a key in the pop-out to assign
            openKeyPop(b, k.steps[i], (pc) => {
              k.steps[i] = pc;
              sendKS();
              selStep = null;
              closeKeyPop();
              paintSteps(node);
            });
          }
          paintSteps(node);
        });
        grid.appendChild(b);
      }
      requestAnimationFrame(() => {
        layoutPorts(node); rebuildObstacles(); rerouteAll();
      });
    }
    for (const b of grid.children) {
      const i = parseInt(b.dataset.s, 10);
      const v = k.steps[i];
      b.textContent = v === null || v === undefined ? "·" : KEY_SHORT[v];
      b.classList.toggle("on", v !== null && v !== undefined);
      b.classList.toggle("sel", selStep === i);
    }
  };
  n.paintKsSteps = paintSteps;
  paintSteps(n, true);
  return n;
}

      fam: "io", rows: [], persistent: true, montype: type,
      ports: [["in", "audio", "thru"], ["out", "audio", "thru"]],
      vizHTML: `<canvas class="vz" data-viz="wave" height="34"></canvas>`,
      kill: (nd) => { waveRide.delete(nd.gid); removeNode(nd); rerouteAll(); saveLayout(); }});
  } else if (type === "spectrum") {
    // Artifix: FFT bars. Same audio ride as Waveform; reuses the scope
    // capture (the browser runs the FFT — no new server data).
    n = addCard({gid, name: "Spectrum", short: "Spec", sub: "global",
      fam: "io", rows: [], persistent: true, montype: type,
      ports: [["in", "audio", "thru"], ["out", "audio", "thru"]],
      vizHTML: `<canvas class="vz" data-viz="spectrum" height="44"></canvas>`,
      kill: (nd) => { waveRide.delete(nd.gid); removeNode(nd); rerouteAll(); saveLayout(); }});
  } else if (type === "sphere") {
    // Artifix: radius-conserving trajectory of a Living Oscillator. Bound to
    // one living-osc assignment id (chosen from those present), not an audio
    // wire — its "source" is a modulator, so no thru ports.
    n = addCard({gid, name: "Sphere", short: "Sphere", sub: "pick a Living Osc",
      fam: "mod", rows: [], persistent: true, montype: type,
      ports: [],
      vizHTML: `<canvas class="vz" data-viz="sphere" height="120"></canvas>`,
      kill: (nd) => { removeNode(nd); rerouteAll(); saveLayout(); }});
  } else {  // notes
    // ctl thru ports let the monitor sit INLINE on a ctl wire (visual ride —
    // drop the card on a ctl wire; the backend wire stays untouched)
    n = addCard({gid, name: "Note Monitor", short: "Notes", sub: "global",
      fam: "io", rows: [], persistent: true, montype: type,
      ports: [["in", "ctl", "thru"], ["out", "ctl", "thru"]],
      vizHTML: `<canvas class="vz" data-viz="notes" height="54"></canvas>`,
      kill: (nd) => { monRide.delete(nd.gid); removeNode(nd); rerouteAll(); saveLayout(); }});
  }
  const p = posMem[gid];
  if (p) { n.x = p[0]; n.y = p[1]; place(n); }
  else {
    const board = $("board");
    n.x = snap(board.scrollLeft + 340 + Math.random() * 140);
    n.y = snap(board.scrollTop + 160 + Math.random() * 180);
    place(n);
    enforceSeparation(n);   // fresh monitors must not stack on existing cards
  }
  return n;
}

// -- expanded-state memory across rebuilds --------------------------------------
const expandMem = {deck: false, drums: false};

// -- the rebuild ----------------------------------------------------------------
function rebuildGraph() {
  if (!state) return;
  if (busy()) { pendingRebuild = true; return; }
  // patch switch → load that patch's remembered layout, respawn its monitors
  if (state.patch !== currentPatch) {
    for (const n of [...nodes.values()]) if (n.montype) removeNode(n);
    const fresh = localStorage.getItem(storeKey(state.patch)) === null;
    currentPatch = state.patch;
    let mons = loadLayout(currentPatch);
    // a patch may declare default monitors (state.monitors); spawn them the
    // FIRST time it's opened in this browser, then persist. A saved layout
    // wins ever after — so removing one makes it stay removed.
    if (fresh && Array.isArray(state.monitors) && state.monitors.length) {
      const POS = {wave: [680, 110], spectrum: [680, 300],
                   sphere: [940, 300], notes: [680, 560]};
      mons = state.monitors.map((type, i) => {
        const p = POS[type] || [680 + (i % 2) * 260, 130 + (i >> 1) * 230];
        return [`mon:${type}:${monN++}`, type, p[0], p[1], true];
      });
      setTimeout(saveLayout, 0);   // persist so these become the saved layout
    }
    for (const [gid, type, x, y, exp] of mons) {
      if (type === "scope") continue;   // pre-v3 layout: scope is a module now
      posMem[gid] = [x, y];
      buildMonitor(type, gid, x, y, exp);
    }
  }
  // remember card positions + expansion, then drop all derived nodes & wires
  for (const n of nodes.values()) {
    posMem[n.gid] = [n.x, n.y];
    if (n.gid === "deck") expandMem.deck = n.expanded;
    if (n.gid === "drums") expandMem.drums = n.expanded;
    if (n.ks) expandMem[n.gid] = n.expanded;
  }
  for (const w of [...wires]) removeWire(w);
  lineCount.audio = 0; lineCount.ctl = 0; lineCount.mod = 0; lineCount.tonic = 0;
  for (const n of [...nodes.values()]) if (!n.persistent) removeNode(n);
  for (const k of Object.keys(uiParam))
    if (!k.startsWith("mon:")) delete uiParam[k];

  // ---- nodes ----
  const keys = buildKeysCard();
  const arp = state.arp ? buildArpCard() : null;
  const deck = buildDeckCard();
  const voiceList = (state.voices && state.voices.length)
    ? state.voices : [{id: "voice", target: state.voice_target}];
  const voiceNodes = voiceList.map(buildVoiceCard);
  const tonicNodes = (state.tonics || []).map(buildTonicCard);
  const ksNodes = (state.keyshifts || []).map(buildKeyshiftCard);
  const services = [], chainNodes = [];
  for (const mod of state.chain) {
    const n = buildChainCard(mod);
    (mod.service ? services : chainNodes).push(n);
  }
  const master = buildMasterCard();
  const drums = buildDrumsCard();
  const lfoNodes = (state.lfos || []).map(buildLfoCard);
  const livingNodes = (state.living || []).map(buildLivingCard);
  const allocNodes = (state.allocations || []).map(buildAllocCard);

  // ---- placement: stored position wins; new nodes flow into columns ----
  const CTL_X = MIN_X + GRID;               // controllers cascade on the left
  const CHAIN_X = CTL_X + 11 * GRID;        // audio chain drops top-down beside it
  const RIGHT_X = CHAIN_X + 11 * GRID;      // drums (and spill) to the right
  const placeCol = (list, x, y0) => {
    let y = y0;
    for (const n of list) {
      if (!n) continue;
      const p = posMem[n.gid];
      if (p) { n.x = p[0]; n.y = p[1]; place(n); continue; }
      n.x = x; n.y = y;
      place(n);
      enforceSeparation(n);
      y = n.y + Math.ceil((n.el.offsetHeight || 64) / GRID) * GRID + GRID;
    }
  };
  placeCol([keys, arp, deck, ...voiceNodes], CTL_X, MIN_Y);
  placeCol([...chainNodes, master], CHAIN_X, MIN_Y);
  // derivers + services sit left of the chain, below the controller cascade
  const svcY = Math.max(...[keys, arp, deck, ...voiceNodes].filter(Boolean)
    .map(n => n.y + (n.el.offsetHeight || 64))) + 2 * GRID;
  placeCol([...tonicNodes, ...ksNodes, ...services], CTL_X, snap(svcY));
  placeCol([drums], RIGHT_X, MIN_Y);
  // each LFO lands left of its target module
  for (let i = 0; i < lfoNodes.length; i++) {
    const n = lfoNodes[i], l = state.lfos[i];
    if (posMem[n.gid]) { n.x = posMem[n.gid][0]; n.y = posMem[n.gid][1]; place(n); continue; }
    const tgt = nodes.get("m:" + l.key);
    n.x = tgt ? tgt.x - CARD_W - 3 * GRID : CTL_X;
    n.y = tgt ? tgt.y : MIN_Y;
    place(n);
    enforceSeparation(n);
  }
  // each Living Oscillator lands left of its target, just below any LFO there
  for (let i = 0; i < livingNodes.length; i++) {
    const n = livingNodes[i], l = state.living[i];
    if (posMem[n.gid]) { n.x = posMem[n.gid][0]; n.y = posMem[n.gid][1]; place(n); continue; }
    const tgt = nodes.get("m:" + l.key);
    n.x = tgt ? tgt.x - CARD_W - 3 * GRID : CTL_X;
    n.y = tgt ? tgt.y + 3 * GRID : MIN_Y;
    place(n);
    enforceSeparation(n);
  }
  // Allocation cards drive many targets — park them in the controller column
  for (let i = 0; i < allocNodes.length; i++) {
    const n = allocNodes[i];
    if (posMem[n.gid]) { n.x = posMem[n.gid][0]; n.y = posMem[n.gid][1]; place(n); continue; }
    n.x = CTL_X; n.y = MIN_Y + i * 8 * GRID;
    place(n);
    enforceSeparation(n);
  }
  if (revealNextAlloc && allocNodes.length) {   // jump to a just-spawned Allocation
    revealCard(allocNodes[allocNodes.length - 1]);
    revealNextAlloc = false;
  }

  // ---- wires (derived, exactly mirroring server truth) ----
  const port = (n, dir, sig, param, lane) => n && n.ports.find(p =>
    p.dir === dir && p.sig === sig && (!param || p.param === param) &&
    (!!param === !!p.quiet) && (lane === undefined || p.lane === lane));
  const W = (a, asig, b, bsig, opts) => a && b && addWire(
    {node: a, port: port(a, "out", asig, null, opts && opts.fromLane)},
    {node: b, port: port(b, "in", bsig, opts && opts.param, opts && opts.toLane)},
    opts || {});
  // control: SERVER TRUTH — state.ctl_wires defines the note router among
  // keys/arp/deck/voice ids/tonic ids/drone instance ids. Cut = ctl_wire
  // remove; port drag ctl-out → ctl-in = ctl_wire add (connectAction). A
  // wire INTO a drone instance is a TONIC wire (amber, deriver tonic-out →
  // drone tonic-in); everything else rides the green ctl family.
  const ctlNode = (k) => nodes.get(k) || nodes.get("m:" + k);
  for (const cw of (state.ctl_wires || [])) {
    // lane endpoints ("keyshift.2:3") resolve to the base node's lane port
    const [fromBase, fromLane] = splitEp(cw.from);
    const [toBase, toLane] = splitEp(cw.to);
    const a = ctlNode(fromBase), b = ctlNode(toBase);
    if (!a || !b) continue;   // e.g. a wired node whose card isn't spawned
    const cut = () => send({type: "ctl_wire", action: "remove",
                            from: cw.from, to: cw.to});
    if (b.mod && (b.mod.type || String(b.mod.key).split(".")[0]) === "drone") {
      W(a, "tonic", b, "tonic", {cut});   // its own color family + handles
      continue;
    }
    // a Note Monitor may RIDE this wire (visual splice): draw A→mon→B but
    // keep the backend wire A→B — cutting either half cuts the real wire
    const ride = [...monRide].find(([gid, set]) =>
      set.has(`${cw.from}>${cw.to}`) && nodes.get(gid));
    if (ride) {
      const mon = nodes.get(ride[0]);
      W(a, "ctl", mon, "ctl", {cut, fromLane});
      W(mon, "ctl", b, "ctl", {cut, toLane});
    } else W(a, "ctl", b, "ctl", {cut, fromLane, toLane});
  }
  // each voice → its target source stays derived (re-drag/chip-click =
  // set_voice_target; a mono voice always drives exactly one target, so
  // this wire is not cuttable)
  for (let i = 0; i < voiceNodes.length; i++) {
    const target = nodes.get("m:" + voiceList[i].target) ||
                   chainNodes.find(n => n.mod && n.mod.kind === "source") || null;
    W(voiceNodes[i], "ctl", target, "ctl");
  }
  // audio: SERVER TRUTH — state.wires is derived from the actual bus routing,
  // so multiple cascades / fan-in render exactly as they sound. Every audio
  // wire cuts with graph_wire remove; master's in port takes any fan-in.
  const audioNode = (k) => k === "master" ? master : nodes.get("m:" + k);
  const audioWires = state.wires || deriveLinearWires();
  for (const wr of audioWires) {
    const a = audioNode(wr.from), b = audioNode(wr.to);
    if (!a || !b) continue;
    const cut = () => send({type: "graph_wire", action: "remove", from: wr.from});
    // a Waveform monitor may RIDE this wire (visual splice, like monRide):
    // draw A→mon→B but keep the backend wire A→B untouched
    const ride = [...waveRide].find(([gid, wid]) =>
      wid === `${wr.from}>${wr.to}` && nodes.get(gid));
    if (ride) {
      const mon = nodes.get(ride[0]);
      W(a, "audio", mon, "audio", {cut});
      W(mon, "audio", b, "audio", {cut});
    } else W(a, "audio", b, "audio", {cut});
  }
  // drums audio out: a standard flexible output. target = key | "master" |
  // null (disconnected). Cut sends target null; re-drag sends a new target.
  const dTarget = state.drums
    ? (state.drums.target !== undefined ? state.drums.target
       : (state.drums.to_chain ? (state.chain.find(c => !c.service) || {}).key : "master"))
    : null;
  // stale target key (module left with a patch switch) → the backend falls
  // back to master at fire time, so the wire honestly points there too
  const dNode = dTarget != null ? (audioNode(dTarget) || master) : null;
  if (dNode) W(drums, "audio", dNode, "audio",
    {cut: () => send({type: "set_drums", target: null})});
  // mod: one wire per LFO assignment → the target param's quiet handle
  for (let i = 0; i < lfoNodes.length; i++) {
    const l = state.lfos[i];
    const tgt = nodes.get("m:" + l.key);
    if (!tgt) continue;
    addWire({node: lfoNodes[i], port: port(lfoNodes[i], "out", "mod")},
            {node: tgt, port: tgt.ports.find(p => p.quiet && p.param === l.param)},
            {lfoId: l.id, cut: () => send({type: "lfo_unassign", id: l.id})});
  }
  // mod: one wire per Living Oscillator assignment → the target param handle
  for (let i = 0; i < livingNodes.length; i++) {
    const l = state.living[i];
    const tgt = nodes.get("m:" + l.key);
    if (!tgt) continue;
    addWire({node: livingNodes[i], port: port(livingNodes[i], "out", "mod")},
            {node: tgt, port: tgt.ports.find(p => p.quiet && p.param === l.param)},
            {cut: () => send({type: "living_unassign", id: l.id})});
  }
  // mod: Allocation Intent fans out — one wire per wired slot, from that dim's
  // out-port to the target param handle
  for (let i = 0; i < allocNodes.length; i++) {
    const a = state.allocations[i], an = allocNodes[i];
    for (const slotStr of Object.keys(a.targets || {})) {
      const t = a.targets[slotStr], slot = Number(slotStr);
      const tgt = nodes.get("m:" + t.key);
      if (!tgt) continue;
      const outPort = an.ports.find(p => p.dir === "out" && p.sig === "mod" && p.slot === slot);
      const inPort = tgt.ports.find(p => p.quiet && p.param === t.param);
      if (!outPort || !inPort) continue;
      addWire({node: an, port: outPort}, {node: tgt, port: inPort},
              {cut: () => send({type: "alloc_unwire", id: a.id, slot})});
    }
  }

  requestAnimationFrame(() => {
    for (const n of nodes.values()) layoutPorts(n);
    rebuildObstacles();
    rerouteAll();
    refreshActivity();
  });
  saveLayout();
}

// ---------- palette ----------
function renderPalette() {
  const pal = $("palette");
  pal.innerHTML = "";
  const btn = (label, color, fn) => {
    const b = document.createElement("button");
    b.innerHTML = `<i style="background:${color}"></i>${esc(label)}`;
    b.addEventListener("click", (e) => { fn(); e.target.blur(); });
    pal.appendChild(b);
  };
  const h3 = (t) => {
    const h = document.createElement("h3"); h.textContent = t; pal.appendChild(h);
  };
  h3("voices");
  btn("Mono Voice", FAMILY.ctl, () => send({type: "spawn_voice"}));
  h3("control");
  btn("LFO ∿", FAMILY.service, () => revealCard(buildArmedLfo()));
  btn("Living ∿", FAMILY.mod, () => revealCard(buildArmedLiving()));
  btn("Allocation ⊕", FAMILY.mod, () => { revealNextAlloc = true; send({type: "alloc_spawn"}); });
  btn("Tonic Deriver", "#d9a521", () => send({type: "spawn_tonic"}));
  btn("Key Shifter", FAMILY.ctl, () => send({type: "spawn_keyshift"}));
  // the palette NEVER removes placed modules: any entry can be spawned
  // again — every click/drag makes a fresh instance ("lowpass.2", ...)
  const avail = (state && state.available) || [];
  for (const [label, kind] of [["sources", "source"], ["effects", "effect"]]) {
    h3(label);
    for (const a of avail.filter(x => x.kind === kind)) {
      const b = document.createElement("button");
      b.innerHTML = `<i style="background:${FAMILY[a.family] || "#888"}"></i>${esc(a.name)}`;
      b.addEventListener("pointerdown", (e) => startPaletteDrag(e, b, a));
      pal.appendChild(b);
    }
  }
  h3("monitors");
  // the oscilloscope lives under effects now (Scope Tap — a real module)
  btn("Waveform", FAMILY.io, () => { revealCard(buildMonitor("wave")); afterMonitor(); });
  btn("Spectrum", FAMILY.io, () => { revealCard(buildMonitor("spectrum")); afterMonitor(); });
  btn("Note Monitor", FAMILY.io, () => { revealCard(buildMonitor("notes")); afterMonitor(); });
  btn("Sphere", FAMILY.mod, () => { revealCard(buildMonitor("sphere")); afterMonitor(); });
}
function afterMonitor() {
  requestAnimationFrame(() => {
    for (const n of nodes.values()) layoutPorts(n);
    rebuildObstacles(); rerouteAll(); saveLayout();
  });
}

// palette CLICK-vs-DRAG: a plain click spawns the module UNCONNECTED at a
// free spot; a drag (>6px) grows a ghost card that follows the cursor —
// dropping it on a highlighted audio wire splices into that wire, dropping
// on empty canvas spawns unconnected right there.
let paletteDrag = null;
function overBoard(ev) {
  const b = $("board").getBoundingClientRect(), p = $("palette").getBoundingClientRect();
  return ev.clientX > p.right && ev.clientY > b.top &&
         ev.clientX < b.right && ev.clientY < b.bottom;
}
function startPaletteDrag(e, btn, a) {
  e.preventDefault();
  try { btn.setPointerCapture(e.pointerId); } catch (_) {}
  paletteDrag = {a, x0: e.clientX, y0: e.clientY, moved: false, ghost: null, hover: null};
  const move = (ev) => {
    const pd = paletteDrag;
    if (!pd) return;
    if (!pd.moved && Math.hypot(ev.clientX - pd.x0, ev.clientY - pd.y0) < 6) return;
    if (!pd.moved) {
      pd.moved = true;
      const g = document.createElement("div");
      g.id = "ghost-card";
      g.innerHTML = `<i style="background:${FAMILY[a.family] || "#888"}"></i>${esc(a.name)}`;
      document.body.appendChild(g);
      pd.ghost = g;
    }
    pd.ghost.style.left = (ev.clientX - 60) + "px";
    pd.ghost.style.top = (ev.clientY - 16) + "px";
    const r = world.getBoundingClientRect();
    const hit = overBoard(ev)
      ? wireNearPoint(ev.clientX - r.left, ev.clientY - r.top, 18) : null;
    if (pd.hover && pd.hover !== hit) pd.hover.el.classList.remove("splice-hi");
    pd.hover = hit;
    if (hit) hit.el.classList.add("splice-hi");
  };
  const finish = (ev, cancelled) => {
    btn.removeEventListener("pointermove", move);
    const pd = paletteDrag;
    paletteDrag = null;
    if (!pd) return;
    if (pd.ghost) pd.ghost.remove();
    if (pd.hover) pd.hover.el.classList.remove("splice-hi");
    if (cancelled) return;
    const r = world.getBoundingClientRect();
    const wx = ev.clientX - r.left, wy = ev.clientY - r.top;
    if (!pd.moved) {
      send({type: "spawn_module", key: a.key});           // click → unconnected
    } else if (pd.hover) {
      spliceNewIntoWire(pd.hover, a.key, a.kind, wx, wy); // drop on wire → splice
    } else if (overBoard(ev)) {
      posMem["m:" + nextId(a.key)] = [snap(Math.max(MIN_X, wx - CARD_W / 2)),
                                      snap(Math.max(MIN_Y, wy))];
      send({type: "spawn_module", key: a.key});           // empty drop → unconnected here
    }
  };
  btn.addEventListener("pointermove", move);
  btn.addEventListener("pointerup", (ev) => finish(ev, false), {once: true});
  btn.addEventListener("pointercancel", (ev) => finish(ev, true), {once: true});
}

// ---------- state → toolbar ----------
function onState() {
  renderPalette();
  $("patch-sel").innerHTML = (state.patches || []).map(p =>
    `<option ${p === state.patch ? "selected" : ""}>${esc(p)}</option>`).join("");
  $("preset-sel").innerHTML = (state.presets || []).map(p =>
    `<option>${esc(p)}</option>`).join("");
  const t = state.transport || {};
  if (sliderDrag !== "bpm") $("bpm").value = t.bpm ?? 100;
  $("bpm-v").textContent = Math.round(t.bpm ?? 100) + " bpm";
  $("meter").value = String(t.beats_per_bar ?? 4);
  $("click-on").checked = !!t.click;
  $("play-btn").textContent = t.running === false ? "▶" : "⏹";
  if (sliderDrag !== "vol") $("vol").value = state.volume;
  $("midi-ind").textContent = "midi: " +
    (state.midi_enabled ? (state.midi_port || "auto") : "off");
  if (busy()) { pendingRebuild = true; return; }
  rebuildGraph();
}

// ---------- live message handlers ----------
function onParam(m) {
  // move the one thumb (unless it's the one being dragged) + keep local model
  const id = `m:${m.key}.${m.name}`;
  if (state) {
    const mod = state.chain.find(c => c.key === m.key);
    if (mod && mod.params[m.name]) mod.params[m.name].value = m.value;
  }
  if (sliderDrag !== id && uiParam[id]) uiParam[id](m.unit, fmt(m.value));
  throttled("act", refreshActivity, 80);
}

let outLevel = 0;
const wave = new Array(200).fill(0);
function onMeters(m) {
  outLevel = Math.max(m.out[0] || 0, m.out[1] || 0);
  wave.push(outLevel);
  if (wave.length > 200) wave.shift();
  const scale = (a) => {
    if (!a || a <= 0) return 0;
    const db = 20 * Math.log10(a);
    return Math.max(0, Math.min(100, (db + 60) / 60 * 100));
  };
  const set = (id, amp) => {
    const el = $(id);
    el.firstElementChild.style.width = scale(amp) + "%";
    el.classList.toggle("clip", amp > 0.99);
  };
  set("m-out-l", m.out[0]); set("m-out-r", m.out[1]);
  throttled("act", refreshActivity, 120);
}

let beatAnchor = null, deckAnchor = null;
function onBeat(m) {
  $("beat-pos").textContent = `${m.bar + 1}.${m.beat + 1}`;
  beatAnchor = {time: performance.now(), downbeat: m.beat === 0};
  deckAnchor = (m.loop === null || m.loop === undefined)
    ? null : {time: performance.now(), phase: m.loop};
  // key shifter progression: highlight the playing step (bar % length)
  for (const n of nodes.values()) {
    if (!n.ks) continue;
    const idx = ((m.bar % n.ks.length) + n.ks.length) % n.ks.length;
    for (const b of n.el.querySelectorAll(".ksstep"))
      b.classList.toggle("ph", parseInt(b.dataset.s, 10) === idx);
  }
}

const rollNotes = [];   // {note, t0, t1, deck} from "voiced" (wire pulses)
const tapNotes = [];    // {note, t0, t1, src} from "tap" — note monitor feed
function onMidi(e) {
  if (e.kind === "tap") {
    // one tap per source-fire (keys/arp/deck/tonic*/keyshift*) — monitors
    // filter by src
    if (e.on) {
      // a re-fired note that is still open closes its old segment first —
      // otherwise duplicate opens pile up and pin full-width bars forever
      for (let i = tapNotes.length - 1; i >= 0; i--)
        if (tapNotes[i].note === e.note && tapNotes[i].t1 === null &&
            tapNotes[i].src === e.src) { tapNotes[i].t1 = performance.now(); break; }
      tapNotes.push({note: e.note, t0: performance.now(), t1: null, src: e.src});
    } else for (let i = tapNotes.length - 1; i >= 0; i--)
      if (tapNotes[i].note === e.note && tapNotes[i].t1 === null &&
          tapNotes[i].src === e.src) { tapNotes[i].t1 = performance.now(); break; }
    while (tapNotes.length > 400) tapNotes.shift();
  } else if (e.kind === "voiced") {
    const deck = !!e.deck;

    ctx.beginPath(); ctx.arc(s[0], s[1], rad, 0, Math.PI*2); ctx.fill(); };
  const c1 = "144,133,233", c2 = "224,168,111";
  if (s1[2] < s2[2]) { ball(s1, c1); ball(s2, c2); } else { ball(s2, c2); ball(s1, c1); }
}
// rolling REAL source taps on a beat grid, colored by src. UNWIRED = GLOBAL
// (all taps); riding ctl wires = LOCAL (only its upstream sources).
const TAP_COLORS = {keys: "#1baf7a", arp: "#e8c832", deck: "#e34948"};
function tapColor(src, style) {
  if (TAP_COLORS[src]) return TAP_COLORS[src];
  if (String(src).startsWith("tonic")) return "#d9a521";    // deriver thru taps
  if (String(src).startsWith("keyshift")) return "#4fd08c"; // shifter out fires
  return style.getPropertyValue("--ctl");
}
function drawNotesViz(n, ctx, W, H, now, style) {
  const srcs = monSources(n.gid);   // null = global
  updateMonSub(n, srcs ? "local: " + [...srcs].sort().join("+") : "global");
  const bpm = state?.transport?.bpm || 100;
  const pxPerMs = W / (16 * 60000 / bpm);   // 16-beat window
  ctx.strokeStyle = style.getPropertyValue("--hairline");
  ctx.lineWidth = 1;
  if (beatAnchor) {
    const beatMs = 60000 / bpm;
    for (let k = 0; k < 20; k++) {
      const x = W - (now - (beatAnchor.time - k * beatMs)) * pxPerMs;
      if (x < 0) break;
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
  }
  const lo = 36, hi = 96;
  for (let i = tapNotes.length - 1; i >= 0; i--) {
    const ev = tapNotes[i];
    if (ev.t1 !== null && (now - ev.t1) * pxPerMs > W) tapNotes.splice(i, 1);
  }
  for (const ev of tapNotes) {
    if (srcs && !srcs.has(ev.src)) continue;   // local: filter by upstream set
    const x0 = W - (now - ev.t0) * pxPerMs;
    const x1 = ev.t1 === null ? W : W - (now - ev.t1) * pxPerMs;
    if (x1 <= 0) continue;
    const y = H - ((Math.min(hi, Math.max(lo, ev.note)) - lo) / (hi - lo)) * (H - 6) - 3;
    ctx.fillStyle = tapColor(ev.src, style);
    ctx.fillRect(Math.max(0, x0), y - 2, Math.max(2, x1 - x0), 4);
  }
}

// ---------- toolbar controls ----------
$("patch-sel").addEventListener("change", (e) => {
  send({type: "select_patch", patch: e.target.value});
  e.target.blur();
});
$("preset-load").addEventListener("click", (e) => {
  const name = $("preset-sel").value;
  if (name) send({type: "load_preset", name});
  e.target.blur();
});
$("preset-save").addEventListener("click", (e) => {
  const name = $("preset-name").value.trim() || $("preset-sel").value || "untitled";
  send({type: "save_preset", name});
  e.target.blur();
});
$("preset-del").addEventListener("click", (e) => {
  const name = $("preset-sel").value;
  if (name) send({type: "delete_preset", name});
  e.target.blur();
});
$("play-btn").addEventListener("click", (e) => {
  const running = state?.transport?.running !== false;
  send({type: "set_transport", playing: !running});
  e.target.blur();
});
function sendTransport() {
  throttled("transport", () => send({
    type: "set_transport",
    bpm: parseFloat($("bpm").value),
    beats_per_bar: parseInt($("meter").value, 10),
    click: $("click-on").checked,
  }));
}
$("bpm").addEventListener("input", () => {
  $("bpm-v").textContent = $("bpm").value + " bpm";
  sendTransport();
});
$("bpm").addEventListener("pointerdown", () => sliderDrag = "bpm");
$("bpm").addEventListener("pointerup", (e) => { sliderDrag = null; e.target.blur(); flushRebuild(); });
$("meter").addEventListener("change", (e) => { sendTransport(); e.target.blur(); });
$("click-on").addEventListener("change", (e) => { sendTransport(); e.target.blur(); });
$("vol").addEventListener("input", (e) => {
  throttled("vol", () => send({type: "set_volume", volume: parseFloat(e.target.value)}));
});
$("vol").addEventListener("pointerdown", () => sliderDrag = "vol");
$("vol").addEventListener("pointerup", (e) => { sliderDrag = null; flushRebuild(); });

// ---------- computer keyboard (legacy verbatim: keymap, caps sustain, space) ----
function keysEnabled() { return $("keys-on").checked; }
function keyTarget(e) {
  const t = e.target;
  if (!t || !t.tagName) return false;
  if (t.tagName === "SELECT" || t.tagName === "TEXTAREA") return true;
  return t.tagName === "INPUT" && !["range", "checkbox"].includes(t.type);
}
const KEYMAP = {a:0, w:1, s:2, e:3, d:4, f:5, t:6, g:7, y:8, h:9, u:10, j:11,
                k:12, o:13, l:14, p:15, ";":16};
let octave = 4;
const held = new Set();
let capsSustain = false;
function syncCaps(e) {
  // macOS quirk: CapsLock keydown on engage / keyup on disengage, and
  // getModifierState is stale during that keyup — trust the event TYPE there
  let on;
  if (e.key === "CapsLock") on = e.type === "keydown";
  else if (e.getModifierState) on = e.getModifierState("CapsLock");
  else return;
  if (on !== capsSustain) {
    capsSustain = on;
    send({type: "sustain", on});
    if (!on) send({type: "all_notes_off"});
    $("caps-note").textContent = on ? "SUSTAIN" : "";
  }
}
window.addEventListener("keydown", (e) => {
  syncCaps(e);
  if (e.repeat || keyTarget(e) || e.metaKey || e.ctrlKey || e.altKey) {
    // macOS swallows the keyup of letter keys while ⌘/ctrl is held — if a
    // modifier lands while notes are down, release them NOW or their offs
    // never arrive (stuck notes + never-clearing monitor bars)
    if ((e.metaKey || e.ctrlKey) && held.size && !keyTarget(e)) noteOffAll();
    return;
  }
  if (e.key === " ") {   // spacebar = loop record, in any input mode
    send({type: "set_looper", action: "record"});
    e.preventDefault();
    return;
  }
  if (!keysEnabled()) return;
  const k = e.key.toLowerCase();
  if (k === "z") { octave = Math.max(1, octave - 1); noteOffAll(); }
  else if (k === "x") { octave = Math.min(7, octave + 1); noteOffAll(); }
  else if (k in KEYMAP) {
    const note = 12 * (octave + 1) + KEYMAP[k];
    if (!held.has(note)) { held.add(note); send({type: "note_on", note}); }
    e.preventDefault();
  }
  $("oct").textContent = `C${octave}`;
  const oc = uiParam["keys.octave"];
  if (oc) oc(0, `C${octave}`);
});
window.addEventListener("keyup", (e) => {
  syncCaps(e);
  if (e.key === " " && !keyTarget(e)) { e.preventDefault(); return; }
  const k = e.key.toLowerCase();
  if (k in KEYMAP) {
    const note = 12 * (octave + 1) + KEYMAP[k];
    held.delete(note); send({type: "note_off", note});
  }
});
function noteOffAll() { held.clear(); send({type: "all_notes_off"}); }
window.addEventListener("blur", noteOffAll);
document.addEventListener("visibilitychange", () => { if (document.hidden) noteOffAll(); });
$("keys-on").addEventListener("change", (e) => {
  if (!e.target.checked) noteOffAll();
  e.target.blur();
});
document.addEventListener("pointerup", (e) => {
  if (e.target.tagName === "BUTTON") e.target.blur();
});
document.addEventListener("change", (e) => {
  if (e.target.tagName === "SELECT") e.target.blur();
});

// ---------- header height → board/palette offset ----------
function fitHeader() {
  const h = $("hdr").offsetHeight;
  $("palette").style.top = h + "px";
  $("board").style.top = h + "px";
}
window.addEventListener("resize", fitHeader);
fitHeader();
setTimeout(fitHeader, 50);

// circumscribe audit: web fonts land after first paint and can change card
// heights → the obstacle map would be stale and wires could slip under cards
if (document.fonts && document.fonts.ready)
  document.fonts.ready.then(() => requestAnimationFrame(() => {
    if (busy()) return;
    for (const n of nodes.values()) layoutPorts(n);
    rebuildObstacles();
    rerouteAll();
  }));

renderPalette();
connect();
</script>
