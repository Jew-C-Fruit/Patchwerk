<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SuperSynth</title>
<style>
  :root {
    --plane: #f9f9f7; --surface: #fcfcfb; --ink-1: #0b0b0b; --ink-2: #52514e;
    --ink-3: #898781; --hairline: #e1e0d9; --border: rgba(11,11,11,0.10);
    --accent: #2a78d6; --meter: #1baf7a; --warn: #eb6834; --danger: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --plane: #0d0d0d; --surface: #1a1a19; --ink-1: #ffffff; --ink-2: #c3c2b7;
      --ink-3: #898781; --hairline: #2c2c2a; --border: rgba(255,255,255,0.10);
      --accent: #3987e5; --meter: #199e70; --warn: #d95926; --danger: #e66767;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--plane); color: var(--ink-1);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 18px; margin: 0; }
  .card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; margin-top: 12px; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .grow { flex: 1; min-width: 140px; }
  label.small, .small { font-size: 11.5px; color: var(--ink-2); }
  select, button { font: inherit; color: var(--ink-1); background: var(--plane);
    border: 1px solid var(--hairline); border-radius: 6px; padding: 5px 8px; }
  button { cursor: pointer; } button:hover { border-color: var(--accent); }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  .meterbar { height: 10px; background: var(--hairline); border-radius: 5px; overflow: hidden; }
  .meterbar > div { height: 100%; width: 0%; background: var(--meter); border-radius: 5px;
    transition: width 60ms linear; }
  .meterbar.clip > div { background: var(--danger); }
  .module { margin-top: 10px; }
  .module h3 { margin: 0 0 2px; font-size: 14px; }
  .module .kind { color: var(--ink-3); font-weight: 400; font-size: 11px; margin-left: 6px; }
  .param { display: grid; grid-template-columns: 110px 1fr 74px 22px; gap: 8px;
    align-items: center; margin-top: 4px; }
  .reset { border: none; background: none; color: var(--ink-3); cursor: pointer;
    font-size: 13px; padding: 0; }
  .reset:hover { color: var(--accent); }
  .param .val { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-2); }
  #status { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    background: var(--danger); margin-right: 6px; }
  #status.ok { background: var(--meter); }
  .kbd-hint { color: var(--ink-2); }
  .kbd-hint kbd { background: var(--plane); border: 1px solid var(--hairline);
    border-radius: 4px; padding: 0 5px; font-family: inherit; }
  #focusnote.active { color: var(--meter); }
  .err { color: var(--danger); font-size: 12px; margin-top: 6px; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="wrap">
  <div class="row" style="justify-content: space-between; margin-top: 4px;">
    <h1><span id="status"></span>SuperSynth</h1>
    <span class="small">
      NOTES:
      <label><input type="checkbox" id="keys-on" checked> computer keys</label>
      <span id="focusnote"></span>
      &nbsp;·&nbsp;
      <label><input type="checkbox" id="midi-on" checked> MIDI</label>
      <select id="midi-sel" style="max-width:180px"></select>
    </span>
  </div>

  <!-- I/O + master -->
  <div class="card">
    <div class="row">
      <div class="grow">
        <label class="small" for="in-sel">AUDIO IN</label><br>
        <select id="in-sel" style="width:100%"></select>
      </div>
      <div class="grow">
        <label class="small" for="out-sel">AUDIO OUT</label><br>
        <select id="out-sel" style="width:100%"></select>
      </div>
      <div><br><button id="apply-io">Apply I/O</button></div>
    </div>
    <div class="small" id="io-note" style="margin-top:6px;"></div>
    <div class="row" style="margin-top: 12px; border-top:1px solid var(--hairline); padding-top:10px;">
      <div>
        <label class="small">TEMPO <span id="bpm-v"></span></label><br>
        <input type="range" id="bpm" min="40" max="240" step="1" style="width:130px">
      </div>
      <div>
        <label class="small">METER</label><br>
        <select id="meter">
          <option value="2">2/4</option><option value="3">3/4</option>
          <option value="4" selected>4/4</option><option value="6">6/8</option>
        </select>
      </div>
      <label class="small"><input type="checkbox" id="click-on"> click</label>
      <label class="small"><input type="checkbox" id="accent-on" checked> hi&nbsp;1</label>
      <span class="small">position: <b id="beat-pos">—</b> <span id="beat-dot" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--hairline);"></span></span>
    </div>
    <div class="row" style="margin-top: 12px;">
      <div class="grow">
        <label class="small">MASTER VOLUME</label>
        <input type="range" id="vol" min="0" max="1" step="0.001" value="0.8">
      </div>
      <div class="grow">
        <label class="small">OUT L</label><div class="meterbar" id="m-out-l"><div></div></div>
        <label class="small">OUT R</label><div class="meterbar" id="m-out-r"><div></div></div>
      </div>
      <div class="grow">
        <label class="small">INPUT <span id="in-meter-note"></span></label>
        <div class="meterbar" id="m-in"><div></div></div>
      </div>
    </div>
  </div>

  <!-- patch + modules -->
  <div class="card">
    <div class="row" style="justify-content: space-between;">
      <div>
        <label class="small" for="patch-sel">PATCH</label><br>
        <select id="patch-sel"></select>
      </div>
      <div class="small" id="chain-desc"></div>
    </div>
    <div class="row" style="margin-top:10px; border-top:1px solid var(--hairline); padding-top:10px;">
      <label class="small"><input type="checkbox" id="arp-on"> <b>ARP</b></label>
      <select id="arp-pattern" class="small"></select>
      <div>
        <label class="small">DIV</label><br>
        <select id="arp-div"></select>
      </div>
      <div class="grow">
        <label class="small">GATE <span id="arp-gate-v"></span></label>
        <input type="range" id="arp-gate" min="0.05" max="1" step="0.01">
      </div>
      <div>
        <label class="small">OCT <span id="arp-oct-v"></span></label><br>
        <input type="range" id="arp-oct" min="1" max="3" step="1" style="width:70px">
      </div>
    </div>
    <div class="row" style="margin-top:8px;">
      <label class="small"><input type="checkbox" id="drone-on"> <b>DRONE</b></label>
      <div>
        <label class="small">EVERY</label><br>
        <select id="drone-every"></select>
      </div>
      <div>
        <label class="small">OCT <span id="drone-oct-v"></span></label><br>
        <input type="range" id="drone-oct" min="0" max="4" step="1" style="width:70px">
      </div>
      <span class="small">root: <b id="drone-root">—</b></span>
    </div>
    <div id="modules"></div>
    <div class="err" id="mod-errors"></div>
  </div>

  <!-- keyboard help -->
  <div class="card kbd-hint small">
    Play notes with <kbd>A</kbd><kbd>W</kbd><kbd>S</kbd><kbd>E</kbd><kbd>D</kbd><kbd>F</kbd><kbd>T</kbd><kbd>G</kbd><kbd>Y</kbd><kbd>H</kbd><kbd>U</kbd><kbd>J</kbd><kbd>K</kbd>…
    (piano layout) · octave <kbd>Z</kbd>/<kbd>X</kbd> — current: <b id="oct">C4</b>
    · target: <b id="voice-target">—</b>
    &nbsp;·&nbsp; MIDI monitor: <b id="midi-mon">—</b>
  </div>
</div>

<script>
"use strict";
let ws = null, state = null, dragging = null;

// ---------- websocket ----------
function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen = () => document.getElementById("status").classList.add("ok");
  ws.onclose = () => {
    document.getElementById("status").classList.remove("ok");
    setTimeout(connect, 1000);
  };
  ws.onmessage = (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === "state") { state = m; renderState(); }
    else if (m.type === "meters") renderMeters(m);
    else if (m.type === "param") trackParam(m);
    else if (m.type === "midi") showMidi(m.event);
    else if (m.type === "beat") onBeat(m);
    else if (m.type === "error") console.warn("server:", m.message);
  };
}
function send(m) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(m)); }

// ---------- rendering ----------
function fmt(v) {
  if (v >= 1000) return v.toFixed(0);
  if (v >= 100) return v.toFixed(1);
  if (v >= 10) return v.toFixed(2);
  return v.toFixed(3);
}
function toUnit(p, value) {
  if (p.curve === "exp") {
    const lo = Math.max(p.min, 1e-6);
    return Math.log(value / lo) / Math.log(p.max / lo);
  }
  return (value - p.min) / (p.max - p.min);
}
function fromUnit(p, u) {
  if (p.curve === "exp") {
    const lo = Math.max(p.min, 1e-6);
    return lo * Math.pow(p.max / lo, u);
  }
  return p.min + u * (p.max - p.min);
}

function renderState() {
  // devices
  const inSel = document.getElementById("in-sel");
  const outSel = document.getElementById("out-sel");
  const dev = state.devices || {inputs: [], outputs: []};
  const opt = (name, label, cur) =>
    `<option value="${name ?? ""}" ${name === cur ? "selected" : ""}>${label}</option>`;
  inSel.innerHTML = opt(null, "System default", state.current_input) +
    dev.inputs.map(d => opt(d.name, `${d.name} (${d.channels}ch, ${d.sample_rate || "?"})`, state.current_input)).join("");
  outSel.innerHTML = opt(null, "System default", state.current_output) +
    dev.outputs.map(d => opt(d.name, `${d.name} (${d.channels}ch, ${d.sample_rate || "?"})`, state.current_output)).join("");
  document.getElementById("io-note").textContent =
    state.boot_note || (state.input_enabled ? "" :
      "audio input is off — pick an input whose sample rate matches the output and Apply");
  document.getElementById("in-meter-note").textContent = state.input_enabled ? "" : "(off)";

  // midi note source
  const msel = document.getElementById("midi-sel");
  const mins = state.midi_inputs || [];
  msel.innerHTML = `<option value="">auto</option>` + mins.map(n =>
    `<option value="${n}" ${n === state.midi_port ? "selected" : ""}>${n}</option>`).join("");
  msel.disabled = !state.midi_enabled;
  document.getElementById("midi-on").checked = !!state.midi_enabled;

  // volume
  if (dragging !== "vol") document.getElementById("vol").value = state.volume;

  // patches
  const psel = document.getElementById("patch-sel");
  psel.innerHTML = state.patches.map(p =>
    `<option ${p === state.patch ? "selected" : ""}>${p}</option>`).join("");
  document.getElementById("chain-desc").textContent =
    state.chain.map(c => c.name).join("  →  ") + "  →  out";

  // modules & params
  const holder = document.getElementById("modules");
  holder.innerHTML = "";
  for (const mod of state.chain) {
    const div = document.createElement("div");
    div.className = "module";
    div.style.opacity = mod.enabled ? "1" : "0.45";
    div.innerHTML = `<h3><label style="cursor:pointer">
      <input type="checkbox" class="mod-on" ${mod.enabled ? "checked" : ""}></label>
      ${mod.name}<span class="kind">${mod.kind} · ${mod.key}${mod.enabled ? "" : " · bypassed"}</span></h3>`;
    div.querySelector(".mod-on").addEventListener("change", (e) => {
      send({type: "set_enabled", key: mod.key, enabled: e.target.checked});
      div.style.opacity = e.target.checked ? "1" : "0.45";
      e.target.blur();
    });
    for (const [pname, p] of Object.entries(mod.params)) {
      const id = `p-${mod.key}-${pname}`;
      const row = document.createElement("div");
      row.className = "param";
      if (p.curve === "toggle") {
        row.innerHTML = `<span class="small">${pname}</span>
          <label><input type="checkbox" id="${id}" ${p.value >= (p.min + p.max) / 2 ? "checked" : ""}></label>
          <span class="val" id="${id}-v">${p.value >= (p.min + p.max) / 2 ? "on" : "off"}</span><span></span>`;
        holder.appendChild(row);
        const box = row.querySelector("input");
        box.addEventListener("change", () => {
          document.getElementById(`${id}-v`).textContent = box.checked ? "on" : "off";
          send({type: "set_param", key: mod.key, name: pname, unit: box.checked ? 1 : 0});
          box.blur();
        });
        div.appendChild(row);
        continue;
      }
      row.innerHTML = `<span class="small">${pname}</span>
        <input type="range" id="${id}" min="0" max="1" step="0.001" value="${toUnit(p, p.value)}">
        <span class="val" id="${id}-v">${fmt(p.value)}</span>
        <button class="reset" title="reset to ${fmt(p.default)}">&#8634;</button>`;
      holder.appendChild(row);
      row.querySelector(".reset").addEventListener("click", (e) => {
        const u = toUnit(p, p.default);
        row.querySelector("input[type=range]").value = u;
        document.getElementById(`${id}-v`).textContent = fmt(p.default);
        send({type: "set_param", key: mod.key, name: pname, unit: u});
        e.target.blur();
      });
      const slider = row.querySelector("input");
      slider.addEventListener("input", () => {
        const u = parseFloat(slider.value);
        document.getElementById(`${id}-v`).textContent = fmt(fromUnit(p, u));
        throttled(`${mod.key}.${pname}`, () =>
          send({type: "set_param", key: mod.key, name: pname, unit: u}));
      });
      slider.addEventListener("pointerdown", () => dragging = id);
      slider.addEventListener("pointerup", () => dragging = null);
      div.appendChild(row);
    }
    holder.appendChild(div);
  }
  document.getElementById("voice-target").textContent = state.voice_target || "none (no playable source)";
  renderArp();
  renderTransport();
  renderDrone();
  const errs = Object.entries(state.module_errors || {});
  document.getElementById("mod-errors").textContent =
    errs.map(([f, e]) => `module ${f} failed to load: ${e}`).join("\n");
}

// Physical control moved -> move the matching virtual slider (unless the
// user is dragging that very slider right now).
function trackParam(m) {
  const id = `p-${m.key}-${m.name}`;
  const slider = document.getElementById(id);
  if (!slider) return;
  if (dragging !== id) slider.value = m.unit;
  const val = document.getElementById(`${id}-v`);
  if (val) val.textContent = fmt(m.value);
  if (state) {  // keep local state in sync so re-renders don't snap back
    const mod = state.chain.find(c => c.key === m.key);
    if (mod && mod.params[m.name]) mod.params[m.name].value = m.value;
  }
}

function showMidi(e) {
  const el = document.getElementById("midi-mon");
  if (!el) return;
  if (e.kind === "cc") {
    el.textContent = e.bound
      ? `CC ${e.cc} → ${e.bound[0]}.${e.bound[1]}`
      : `CC ${e.cc} = ${(e.unit * 127) | 0} (unbound)`;
  } else if (e.kind === "bend") {
    el.textContent = `bend ${e.semitones >= 0 ? "+" : ""}${e.semitones.toFixed(2)} st`;
  } else if (e.kind === "sustain") {
    el.textContent = `sustain ${e.on ? "ON" : "off"}`;
  } else if (e.kind === "drone") {
    el.textContent = `drone root → ${e.root}`;
    document.getElementById("drone-root").textContent = e.root;
  }
}

function renderMeters(m) {
  const scale = a => {
    if (!a || a <= 0) return 0;
    const db = 20 * Math.log10(a);
    return Math.max(0, Math.min(100, (db + 60) / 60 * 100));
  };
  const set = (id, amp) => {
    const el = document.getElementById(id);
    el.firstElementChild.style.width = scale(amp) + "%";
    el.classList.toggle("clip", amp > 0.99);
  };
  set("m-out-l", m.out[0]); set("m-out-r", m.out[1]);
  if (m.in !== null && m.in !== undefined) set("m-in", m.in);
}

// ---------- arp ----------
function renderArp() {
  const a = state.arp;
  const row = document.getElementById("arp-on").closest(".row");
  row.style.display = a ? "" : "none";
  if (!a) return;
  document.getElementById("arp-on").checked = a.enabled;
  const psel = document.getElementById("arp-pattern");
  psel.innerHTML = a.patterns.map(p =>
    `<option ${p === a.pattern ? "selected" : ""}>${p}</option>`).join("");
  const dsel = document.getElementById("arp-div");
  dsel.innerHTML = a.divisions.map(d =>
    `<option ${d === a.division ? "selected" : ""}>${d}</option>`).join("");
  if (dragging !== "arp-gate") document.getElementById("arp-gate").value = a.gate;
  document.getElementById("arp-gate-v").textContent = Math.round(a.gate * 100) + "%";
  if (dragging !== "arp-oct") document.getElementById("arp-oct").value = a.octaves;
  document.getElementById("arp-oct-v").textContent = a.octaves;
}
function renderDrone() {
  const d = state.drone;
  const row = document.getElementById("drone-on").closest(".row");
  row.style.display = d ? "" : "none";
  if (!d) return;
  document.getElementById("drone-on").checked = d.enabled;
  const esel = document.getElementById("drone-every");
  esel.innerHTML = d.everies.map(e =>
    `<option ${e === d.every ? "selected" : ""}>${e}</option>`).join("");
  if (dragging !== "drone-oct") document.getElementById("drone-oct").value = d.octave;
  document.getElementById("drone-oct-v").textContent = d.octave;
  document.getElementById("drone-root").textContent = d.root || "listening…";
}
function sendDrone() {
  throttled("drone", () => send({
    type: "set_drone",
    enabled: document.getElementById("drone-on").checked,
    every: document.getElementById("drone-every").value,
    octave: parseInt(document.getElementById("drone-oct").value, 10),
  }));
}
for (const id of ["drone-on", "drone-every"]) {
  document.getElementById(id).addEventListener("change", (e) => { sendDrone(); e.target.blur(); });
}
{
  const el = document.getElementById("drone-oct");
  el.addEventListener("input", () => {
    document.getElementById("drone-oct-v").textContent = el.value;
    sendDrone();
  });
  el.addEventListener("pointerdown", () => dragging = "drone-oct");
  el.addEventListener("pointerup", (e) => { dragging = null; e.target.blur(); });
}
function renderTransport() {
  const t = state.transport;
  if (!t) return;
  if (dragging !== "bpm") document.getElementById("bpm").value = t.bpm;
  document.getElementById("bpm-v").textContent = Math.round(t.bpm) + " bpm";
  document.getElementById("meter").value = String(t.beats_per_bar);
  document.getElementById("click-on").checked = !!t.click;
  document.getElementById("accent-on").checked = t.accent !== false;
}
function sendArp() {
  throttled("arp", () => send({
    type: "set_arp",
    enabled: document.getElementById("arp-on").checked,
    pattern: document.getElementById("arp-pattern").value,
    division: document.getElementById("arp-div").value,
    gate: parseFloat(document.getElementById("arp-gate").value),
    octaves: parseInt(document.getElementById("arp-oct").value, 10),
  }));
}
function sendTransport() {
  throttled("transport", () => send({
    type: "set_transport",
    bpm: parseFloat(document.getElementById("bpm").value),
    beats_per_bar: parseInt(document.getElementById("meter").value, 10),
    click: document.getElementById("click-on").checked,
    accent: document.getElementById("accent-on").checked,
  }));
}
for (const id of ["arp-on", "arp-pattern", "arp-div"]) {
  document.getElementById(id).addEventListener("change", (e) => { sendArp(); e.target.blur(); });
}
for (const id of ["arp-gate", "arp-oct"]) {
  const el = document.getElementById(id);
  el.addEventListener("input", () => {
    sendArp();
    if (id === "arp-gate") document.getElementById("arp-gate-v").textContent =
      Math.round(parseFloat(el.value) * 100) + "%";
    if (id === "arp-oct") document.getElementById("arp-oct-v").textContent = el.value;
  });
  el.addEventListener("pointerdown", () => dragging = id);
  el.addEventListener("pointerup", () => dragging = null);
}
document.getElementById("bpm").addEventListener("input", () => {
  document.getElementById("bpm-v").textContent = document.getElementById("bpm").value + " bpm";
  sendTransport();
});
document.getElementById("bpm").addEventListener("pointerdown", () => dragging = "bpm");
document.getElementById("bpm").addEventListener("pointerup", (e) => { dragging = null; e.target.blur(); });
for (const id of ["meter", "click-on", "accent-on"]) {
  document.getElementById(id).addEventListener("change", (e) => { sendTransport(); e.target.blur(); });
}
function onBeat(m) {
  document.getElementById("beat-pos").textContent = `${m.bar + 1}.${m.beat + 1}`;
  const dot = document.getElementById("beat-dot");
  dot.style.background = m.beat === 0 ? "var(--accent)" : "var(--meter)";
  setTimeout(() => { dot.style.background = "var(--hairline)"; }, 90);
}

// ---------- throttling ----------
const timers = {};
function throttled(key, fn, ms = 33) {
  if (timers[key]) { timers[key].fn = fn; return; }
  fn();
  timers[key] = { fn: null };
  setTimeout(() => {
    const pending = timers[key].fn;
    delete timers[key];
    if (pending) throttled(key, pending, ms);
  }, ms);
}

// ---------- controls ----------
document.getElementById("vol").addEventListener("input", (e) => {
  throttled("vol", () => send({type: "set_volume", volume: parseFloat(e.target.value)}));
});
document.getElementById("vol").addEventListener("pointerdown", () => dragging = "vol");
document.getElementById("vol").addEventListener("pointerup", () => dragging = null);
document.getElementById("patch-sel").addEventListener("change", (e) => {
  send({type: "select_patch", patch: e.target.value});
});
document.getElementById("apply-io").addEventListener("click", (e) => {
  send({type: "set_devices",
        input: document.getElementById("in-sel").value || null,
        output: document.getElementById("out-sel").value || null});
  e.target.blur();
});
document.getElementById("keys-on").addEventListener("change", (e) => {
  if (!e.target.checked) noteOffAll();
  e.target.blur();
});
function sendMidiChoice() {
  send({type: "set_midi",
        port: document.getElementById("midi-sel").value || null,
        enabled: document.getElementById("midi-on").checked});
}
document.getElementById("midi-on").addEventListener("change", (e) => {
  sendMidiChoice(); e.target.blur();
});
document.getElementById("midi-sel").addEventListener("change", sendMidiChoice);
// Release focus after using a control, so the page (not the control) has it.
document.addEventListener("pointerup", (e) => {
  if (e.target.tagName === "INPUT" && e.target.type === "range") e.target.blur();
  if (e.target.tagName === "BUTTON") e.target.blur();
});
document.addEventListener("change", (e) => {
  if (e.target.tagName === "SELECT") e.target.blur();
});
// A select that was clicked but not changed keeps focus and swallows note
// keys (type-ahead) — drop its focus the moment you click anywhere else.
document.addEventListener("pointerdown", (e) => {
  const a = document.activeElement;
  if (a && (a.tagName === "SELECT" || a.tagName === "BUTTON") &&
      e.target !== a && !a.contains(e.target)) {
    a.blur();
  }
});

// ---------- computer keyboard as controller ----------
// Only fires while this window is focused: browsers deliver keydown/keyup
// exclusively to the focused page, and we release everything on blur.
const KEYMAP = {a:0, w:1, s:2, e:3, d:4, f:5, t:6, g:7, y:8, h:9, u:10, j:11,
                k:12, o:13, l:14, p:15, ";":16};
let octave = 4;                 // C4 = MIDI 60
const held = new Set();
const octName = () => `C${octave}`;

function keysEnabled() { return document.getElementById("keys-on").checked; }
function keyTarget(e) {
  // Only text-entry and dropdown elements swallow note keys. Sliders,
  // checkboxes and buttons do NOT — so tweaking a param never kills the keys.
  const t = e.target;
  if (!t || !t.tagName) return false;
  if (t.tagName === "SELECT" || t.tagName === "TEXTAREA") return true;
  return t.tagName === "INPUT" && !["range", "checkbox"].includes(t.type);
}
window.addEventListener("keydown", (e) => {
  if (e.repeat || !keysEnabled() || keyTarget(e) || e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key.toLowerCase();
  if (k === "z") { octave = Math.max(1, octave - 1); noteOffAll(); }
  else if (k === "x") { octave = Math.min(7, octave + 1); noteOffAll(); }
  else if (k in KEYMAP) {
    const note = 12 * (octave + 1) + KEYMAP[k];
    if (!held.has(note)) { held.add(note); send({type: "note_on", note}); }
    e.preventDefault();
  }
  document.getElementById("oct").textContent = octName();
});
window.addEventListener("keyup", (e) => {
  const k = e.key.toLowerCase();
  if (k in KEYMAP) {
    const note = 12 * (octave + 1) + KEYMAP[k];
    held.delete(note);
    send({type: "note_off", note});
  }
});
function noteOffAll() { held.clear(); send({type: "all_notes_off"}); }
function setFocusNote(focused) {
  const el = document.getElementById("focusnote");
  el.classList.toggle("active", focused);
  el.textContent = focused ? "(live)" : "(needs window focus)";
}
window.addEventListener("blur", () => { noteOffAll(); setFocusNote(false); });
window.addEventListener("focus", () => setFocusNote(true));
document.addEventListener("visibilitychange", () => {
  if (document.hidden) noteOffAll();
});

connect();
setFocusNote(document.hasFocus());
</script>
</body>
</html>
